{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "task-manager.fullname" . }}
  labels:
    {{- include "task-manager.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Override these via --set or values file. Never commit real values.
  database-url: {{ (.Values.databaseUrl | default "postgres://user:pass@localhost:5432/taskmanager?sslmode=disable") | quote }}
  jwt-secret: {{ (.Values.jwtSecret | default "change-me-in-production") | quote }}
{{- end }}
