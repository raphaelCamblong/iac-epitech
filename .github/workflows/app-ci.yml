name: App CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/*'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23.1'
          cache-dependency-path: app/go.sum
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: app

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23.1'
          cache-dependency-path: app/go.sum
      - name: Run Tests
        working-directory: app
        run: go test -v -race ./...

  build-and-push:
    name: Build & Push Docker Image
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: 'projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider'
          service_account: 'github-actions-sa@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com'

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west9-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: ./app
          push: true
          tags: |
            europe-west9-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/task-manager-${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}/task-manager:${{ github.sha }}
            europe-west9-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/task-manager-${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}/task-manager:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
