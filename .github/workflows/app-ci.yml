name: App CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/*'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.1'
          cache-dependency-path: app/go.sum
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: app
          args: --out-format=colored-line-number

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.1'
          cache-dependency-path: app/go.sum
      - name: Run Tests
        working-directory: app
        run: go test -v -race ./...

  build-and-push:
    name: Build & Push Docker Image
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write' # Required for GCP Workload Identity
    steps:
      - uses: actions/checkout@v4

      - name: Set Image Tag
        id: set_tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider'
          service_account: 'github-actions-sa@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Determine Environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "ENV=prod" >> $GITHUB_ENV
            echo "REGISTRY_URL=europe-west9-docker.pkg.dev/your-gcp-project-id/task-manager-prod" >> $GITHUB_ENV
          else
            echo "ENV=dev" >> $GITHUB_ENV
            echo "REGISTRY_URL=europe-west9-docker.pkg.dev/your-gcp-project-id/task-manager-dev" >> $GITHUB_ENV
          fi

      - name: Configure Docker
        run: gcloud auth configure-docker europe-west9-docker.pkg.dev

      - name: Build Docker Image
        working-directory: app
        run: docker build -t ${{ env.REGISTRY_URL }}/task-manager:${{ env.IMAGE_TAG }} -t ${{ env.REGISTRY_URL }}/task-manager:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ env.REGISTRY_URL }}/task-manager:${{ env.IMAGE_TAG }}
          docker push ${{ env.REGISTRY_URL }}/task-manager:latest
