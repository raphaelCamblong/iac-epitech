name: Infra CD

on:
  workflow_run:
    workflows: ["App CI"]
    types:
      - completed

jobs:
  deploy:
    name: Deploy Infrastructure
    runs-on: arc-runner-set
    if: ${{ github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'develop') }}

    environment:
      name: ${{ github.event.workflow_run.head_branch == 'main' && 'prod' || 'dev' }}

    permissions:
      contents: read
      id-token: write

    env:
      TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
      TF_VAR_image_tag: ${{ github.event.workflow_run.head_sha }}
      TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
      TF_VAR_github_pat: ${{ secrets.PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure Terraform environment
        run: |
          echo "TF_IN_AUTOMATION=true" >> "$GITHUB_ENV"
          echo "TF_PLUGIN_CACHE_DIR=${HOME}/.terraform.d/plugin-cache" >> "$GITHUB_ENV"
          if [[ "${{ github.event.workflow_run.head_branch }}" == "main" ]]; then
            echo "TF_DIR=infrastructure/environments/prod" >> "$GITHUB_ENV"
          else
            echo "TF_DIR=infrastructure/environments/dev" >> "$GITHUB_ENV"
          fi

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: ${{ runner.os }}-terraform-plugins-${{ hashFiles('infrastructure/**/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-plugins-

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: 'projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider'
          service_account: 'github-actions-sa@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.6.0
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan -no-color -input=false -out=tfplan

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -no-color -input=false -auto-approve tfplan

      - name: Get Ingress URL
        working-directory: ${{ env.TF_DIR }}
        run: echo "URL=$(terraform output -raw ingress_url)" >> "$GITHUB_ENV"

      - name: Setup Python (for Locust)
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Locust
        run: pip install locust

      - name: Run Load Test
        working-directory: locust
        run: >
          locust -f locustfile.py
          --headless
          -u 10
          -r 2
          --run-time 1m
          --host ${{ env.URL }}
